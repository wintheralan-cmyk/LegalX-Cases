<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegalX - Classificador de Cláusulas (POC)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#121212] text-gray-100 font-sans min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Base de dados exata do seu arquivo clausulas.json
        const clausulasDB = [
            {
                "nome": "Partes",
                "conteudo": "Identifica corretamente o contratante e a contratada, contendo qualificação suficiente para individualizar as partes e definir quem assume as obrigações contratuais.",
                "margem": {
                    "aceitavel": ["Nome ou razão social", "CPF ou CNPJ", "Representante legal quando aplicável", "Qualificação suficiente para identificar ambas as partes"],
                    "negociavel": ["Endereço completo", "Estado civil", "Profissão", "Dados adicionais de contato", "Cláusula específica sobre grupo econômico"],
                    "inaceitavel": ["Ausência de identificação de uma das partes", "Informações insuficientes para identificar o contratante", "Representante sem poderes aparentes", "Contradição entre as partes mencionadas no contrato"]
                }
            },
            {
                "nome": "Objeto do Contrato",
                "conteudo": "Define os serviços de RH que serão prestados, delimitando claramente seu escopo.",
                "margem": {
                    "aceitavel": ["Descrição objetiva dos serviços", "Escopo claramente definido"],
                    "negociavel": ["Detalhamento das atividades", "Cronograma", "Entregáveis", "Exclusões do escopo"],
                    "inaceitavel": ["Objeto genérico ou indeterminado", "Serviços contraditórios", "Impossibilidade de identificar a prestação contratada"]
                }
            },
            {
                "nome": "Obrigações das Partes",
                "conteudo": "Define os deveres e responsabilidades do contratante e da prestadora.",
                "margem": {
                    "aceitavel": ["Responsabilidades básicas de ambas as partes"],
                    "negociavel": ["Fluxos operacionais", "Procedimentos", "Responsáveis internos", "Prazos específicos"],
                    "inaceitavel": ["Obrigações previstas apenas para uma parte sem justificativa", "Responsabilidades contraditórias", "Ausência de deveres mínimos"]
                }
            },
            {
                "nome": "Remuneração e Condições de Pagamento",
                "conteudo": "Estabelece valores, forma de pagamento e reajustes.",
                "margem": {
                    "aceitavel": ["Valor", "Forma de pagamento", "Prazo de pagamento"],
                    "negociavel": ["Índice de reajuste", "Multa", "Juros", "Correção monetária", "Tributos"],
                    "inaceitavel": ["Valor indeterminado", "Forma de pagamento inexistente", "Cobranças contraditórias"]
                }
            },
            {
                "nome": "Confidencialidade",
                "conteudo": "Protege informações confidenciais compartilhadas durante a execução do contrato.",
                "margem": {
                    "aceitavel": ["Obrigação de sigilo"],
                    "negociavel": ["Prazo de confidencialidade", "Penalidades", "Exceções", "Devolução de documentos"],
                    "inaceitavel": ["Ausência de proteção de informações sensíveis", "Autorização irrestrita de divulgação", "Contradições sobre confidencialidade"]
                }
            },
            {
                "nome": "Proteção de Dados Pessoais (LGPD)",
                "conteudo": "Estabelece as obrigações das partes em conformidade com a Lei Geral de Proteção de Dados.",
                "margem": {
                    "aceitavel": ["Previsão de conformidade com a LGPD", "Cláusula básica de proteção de dados"],
                    "negociavel": ["Definição de controlador e operador", "Incidentes de segurança", "Suboperadores", "Bases legais"],
                    "inaceitavel": ["Tratamento de dados sem qualquer proteção", "Cláusulas incompatíveis com a LGPD", "Transferência irrestrita de dados pessoais"]
                }
            },
            {
                "nome": "Responsabilidade Trabalhista e Previdenciária",
                "conteudo": "Define a responsabilidade sobre encargos trabalhistas, previdenciários e fiscais.",
                "margem": {
                    "aceitavel": ["Responsabilidade claramente atribuída"],
                    "negociavel": ["Comprovação periódica de recolhimentos", "Direito de auditoria", "Retenções"],
                    "inaceitavel": ["Transferência ilegal de responsabilidade", "Ausência de definição das responsabilidades", "Contradições entre cláusulas"]
                }
            },
            {
                "nome": "Níveis de Serviço (SLA)",
                "conteudo": "Estabelece indicadores de desempenho da prestação dos serviços.",
                "margem": {
                    "aceitavel": ["Prazos ou indicadores mínimos"],
                    "negociavel": ["KPIs", "Multas manifestamente abusivas", "Contradições sobre responsabilização"],
                    "inaceitavel": ["Ausência de metas básicas", "Cláusulas abusivas", "Falta de penalidade por descumprimento crônico"]
                }
            },
            {
                "nome": "Foro e Solução de Controvérsias",
                "conteudo": "Define como serão resolvidos os conflitos decorrentes do contrato.",
                "margem": {
                    "aceitavel": ["Definição de foro comum amigável"],
                    "negociavel": ["Cláusula de Mediação prévia", "Cláusula de Arbitragem", "Escolha de foro específico estratégico"],
                    "inaceitavel": ["Ausência de foro elegível", "Foro de difícil acesso sem justificativa", "Conflito de jurisdição intransponível"]
                }
            }
        ];

        function App() {
            const [analisado, setAnalisado] = useState(false);
            const [loading, setLoading] = useState(false);
            const [showModal, setShowModal] = useState(false);

            const executarAnaliseMockada = () => {
                setLoading(true);
                setTimeout(() => {
                    setAnalisado(true);
                    setLoading(false);
                }, 1000);
            };

            return (
                <div class="min-h-screen flex flex-col justify-between relative">
                    <nav class="bg-[#1e1e1e] border-b border-gray-800 sticky top-0 z-40">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div class="flex items-center justify-between h-16">
                                <div class="flex items-center gap-2">
                                    <span class="text-blue-500 font-black text-xl tracking-wider">LegalX</span>
                                </div>
                                <div class="flex space-x-1 md:space-x-4 text-sm md:text-base overflow-x-auto">
                                    <a href="index.html" class="text-gray-300 hover:bg-gray-850 hover:text-white px-3 py-2 rounded-md font-medium transition">Home</a>
                                    <a href="case1.html" class="text-gray-300 hover:bg-gray-850 hover:text-white px-3 py-2 rounded-md font-medium transition">Case 1</a>
                                    <a href="classificador.html" class="bg-blue-600 text-white px-3 py-2 rounded-md font-medium">⚡ Classificador (POC)</a>
                                    <a href="case2.html" class="text-gray-300 hover:bg-gray-850 hover:text-white px-3 py-2 rounded-md font-medium transition">Case 2</a>
                                    <a href="case3.html" class="text-gray-300 hover:bg-gray-850 hover:text-white px-3 py-2 rounded-md font-medium transition">Case 3</a>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main class="flex-grow max-w-5xl mx-auto px-4 py-12 w-full space-y-8">
                        <div class="bg-[#1e1e1e] p-6 rounded-xl border border-gray-800 shadow-xl flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                            <div>
                                <h1 class="text-2xl font-bold text-white mb-2">Demonstração Interativa da Solução (POC)</h1>
                                <p class="text-gray-400 text-sm">Esta interface simula a chamada de API mapeando o arquivo carregado contra a base legal configurada.</p>
                            </div>
                            <button 
                                onClick={() => setShowModal(true)}
                                class="bg-gray-800 hover:bg-gray-700 text-yellow-400 border border-gray-700 px-4 py-2 rounded-md font-mono text-xs whitespace-nowrap self-start sm:self-center transition"
                            >
                                🔍 Ver clausulas.json
                            </button>
                        </div>

                        <div class="border-2 border-dashed border-gray-700 rounded-lg p-8 text-center bg-gray-900/50">
                            <span class="text-4xl">📄</span>
                            <p class="mt-2 text-sm text-gray-300">Minuta_Contrato_Prestacao_Servicos_RH_v3.pdf</p>
                            <p class="text-xs text-gray-500">Documento em OCR pré-carregado no contexto</p>
                            <button 
                                onClick={executarAnaliseMockada}
                                disabled={loading}
                                class="mt-4 bg-blue-600 text-white px-5 py-2 rounded-md font-semibold text-sm hover:bg-blue-700 transition disabled:opacity-50"
                            >
                                {loading ? 'Processando IA via API...' : 'Simular Análise de IA'}
                            </button>
                        </div>

                        {/* Tabela de Resultados */}
                        {analisado && (
                            <div class="bg-[#1e1e1e] rounded-xl border border-gray-800 shadow-xl overflow-hidden transition-all duration-300">
                                <div class="p-5 border-b border-gray-800 bg-gray-900/50 flex justify-between items-center">
                                    <h2 class="text-lg font-bold text-white">Relatório Gerado por IA</h2>
                                    <span class="bg-green-900/40 border border-green-700 text-green-400 text-xs px-2.5 py-1 rounded-full font-mono">Status: Concluído</span>
                                </div>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left border-collapse text-sm">
                                        <thead>
                                            <tr class="bg-[#151515] text-gray-400 border-b border-gray-800 uppercase text-xs tracking-wider">
                                                <th class="p-4">Cláusula</th>
                                                <th class="p-4">Situação</th>
                                                <th class="p-4">Justificativa / Mapeamento Legal</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-gray-800 text-gray-300">
                                            <tr>
                                                <td class="p-4 font-semibold text-white">Partes</td>
                                                <td class="p-4"><span class="bg-green-950 text-green-400 px-2 py-1 rounded text-xs font-bold border border-green-800">ACEITÁVEL</span></td>
                                                <td class="p-4 text-gray-400">Qualificação suficiente identificando adequadamente ambas as partes no preâmbulo contratual.</td>
                                            </tr>
                                            <tr>
                                                <td class="p-4 font-semibold text-white">Objeto do Contrato</td>
                                                <td class="p-4"><span class="bg-green-950 text-green-400 px-2 py-1 rounded text-xs font-bold border border-green-800">ACEITÁVEL</span></td>
                                                <td class="p-4 text-gray-400">Escopo de serviços de recrutamento e gerenciamento de RH claramente delimitado.</td>
                                            </tr>
                                            <tr>
                                                <td class="p-4 font-semibold text-white">Obrigações das Partes</td>
                                                <td class="p-4"><span class="bg-red-950 text-red-400 px-2 py-1 rounded text-xs font-bold border border-red-800">INACEITÁVEL</span></td>
                                                <td class="p-4 text-gray-400">Ausência completa de deveres operacionais e cronogramas imputados ao contratante. Risco de desequilíbrio estrutural.</td>
                                            </tr>
                                            <tr>
                                                <td class="p-4 font-semibold text-white">Remuneração e Pagamento</td>
                                                <td class="p-4"><span class="bg-yellow-950 text-yellow-400 px-2 py-1 rounded text-xs font-bold border border-yellow-800">NEGOCIÁVEL</span></td>
                                                <td class="p-4 text-gray-400">Falta especificar taxas incidentes sobre atrasos de pagamento e o índice anual de correção monetária.</td>
                                            </tr>
                                            <tr>
                                                <td class="p-4 font-semibold text-white">Proteção de Dados (LGPD)</td>
                                                <td class="p-4"><span class="bg-yellow-950 text-yellow-400 px-2 py-1 rounded text-xs font-bold border border-yellow-800">NEGOCIÁVEL</span></td>
                                                <td class="p-4 text-gray-400">Falta discriminar claramente a matriz de responsabilidade entre Controlador e Operador de dados na operação de RH.</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modal Pop-up para exibir o clausulas.json */}
                    {showModal && (
                        <div class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div class="bg-[#1e1e1e] border border-gray-800 rounded-xl max-w-3xl w-full max-h-[80vh] flex flex-col shadow-2xl">
                                <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900/50">
                                    <h3 class="text-white font-bold font-mono text-sm">Banco de Cláusulas (clausulas.json)</h3>
                                    <button 
                                        onClick={() => setShowModal(false)}
                                        class="text-gray-400 hover:text-white font-bold px-2 py-1 rounded bg-gray-800 border border-gray-700 text-xs"
                                    >
                                        Fechar (Esc)
                                    </button>
                                </div>
                                <div class="p-4 overflow-y-auto font-mono text-xs text-blue-400 bg-gray-950/50 flex-grow">
                                    <pre class="whitespace-pre-wrap">{JSON.stringify(clausulasDB, null, 4)}</pre>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer class="bg-[#1a1a1a] border-t border-gray-800 py-6 text-center text-sm text-gray-500">
                        Opice Blum © 2026 | Redefinindo os limites do possível
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
